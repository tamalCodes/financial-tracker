<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..700&family=Geist:wght@400..600&display=swap" rel="stylesheet">
</helmet>
<div style="font-family:'Geist',system-ui,sans-serif;background:#fff;border:1px solid #e2e8f0;border-radius:26px;box-shadow:0 1px 2px rgba(15,23,42,0.04),0 14px 30px -22px rgba(15,23,42,0.30);padding:18px 18px;display:flex;flex-direction:column;gap:14px">
  <div style="display:flex;align-items:center;justify-content:space-between;gap:10px">
    <span style="font:500 13px 'Geist';letter-spacing:0.01em;color:#64748b">Left in bank</span>
    <div style="display:flex;align-items:center;gap:8px">
      <button onClick="{{ onPrev }}" aria-label="Previous month" style="cursor:pointer;width:30px;height:30px;border-radius:10px;border:1px solid #e2e8f0;background:#f8fafc;display:flex;align-items:center;justify-content:center;padding:0"><svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5l-5 5 5 5"/></svg></button>
      <span style="font:600 13px 'Bricolage Grotesque';color:#334155;min-width:78px;text-align:center;white-space:nowrap">{{ month }}</span>
      <button onClick="{{ onNext }}" aria-label="Next month" style="cursor:pointer;width:30px;height:30px;border-radius:10px;border:1px solid #e2e8f0;background:#f8fafc;display:flex;align-items:center;justify-content:center;padding:0"><svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 5l5 5-5 5"/></svg></button>
    </div>
  </div>
  <span style="font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:36px;line-height:1;letter-spacing:-0.03em;color:#0f172a;font-variant-numeric:tabular-nums">₹{{ net }}</span>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:2px">
    <div style="background:linear-gradient(135deg,rgba(16,185,129,0.30),rgba(16,185,129,0.15));border:1px solid rgba(16,185,129,0.45);border-radius:18px;padding:13px 12px;display:flex;flex-direction:column;gap:8px;backdrop-filter:blur(14px) saturate(1.7);-webkit-backdrop-filter:blur(14px) saturate(1.7);box-shadow:inset 0 1px 0 rgba(255,255,255,0.6),0 1px 2px rgba(15,23,42,0.04)">
      <span style="display:inline-flex;align-items:center;gap:5px;font:600 11.5px 'Bricolage Grotesque';color:#047857">
        <svg width="13" height="13" viewBox="0 0 20 20" fill="none" stroke="#047857" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 14V4"/><path d="M6 8l4-4 4 4"/></svg>Earned</span>
      <span style="font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:16.5px;letter-spacing:-0.02em;color:#065f46;font-variant-numeric:tabular-nums">₹{{ earned }}</span>
    </div>
    <div style="background:linear-gradient(135deg,rgba(239,68,68,0.26),rgba(239,68,68,0.13));border:1px solid rgba(239,68,68,0.42);border-radius:18px;padding:13px 12px;display:flex;flex-direction:column;gap:8px;backdrop-filter:blur(14px) saturate(1.7);-webkit-backdrop-filter:blur(14px) saturate(1.7);box-shadow:inset 0 1px 0 rgba(255,255,255,0.6),0 1px 2px rgba(15,23,42,0.04)">
      <span style="display:inline-flex;align-items:center;gap:5px;font:600 11.5px 'Bricolage Grotesque';color:#b91c1c">
        <svg width="13" height="13" viewBox="0 0 20 20" fill="none" stroke="#b91c1c" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 6v10"/><path d="M6 12l4 4 4-4"/></svg>Spent</span>
      <span style="font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:16.5px;letter-spacing:-0.02em;color:#991b1b;font-variant-numeric:tabular-nums">₹{{ spent }}</span>
    </div>
    <div style="background:linear-gradient(135deg,rgba(139,92,246,0.26),rgba(139,92,246,0.13));border:1px solid rgba(139,92,246,0.42);border-radius:18px;padding:13px 12px;display:flex;flex-direction:column;gap:8px;backdrop-filter:blur(14px) saturate(1.7);-webkit-backdrop-filter:blur(14px) saturate(1.7);box-shadow:inset 0 1px 0 rgba(255,255,255,0.6),0 1px 2px rgba(15,23,42,0.04)">
      <span style="display:inline-flex;align-items:center;gap:5px;font:600 11.5px 'Bricolage Grotesque';color:#6d28d9">
        <svg width="13" height="13" viewBox="0 0 20 20" fill="none" stroke="#6d28d9" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 14l5-5 3 3 6-7"/><path d="M14 5h4v4"/></svg>Invested</span>
      <span style="font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:16.5px;letter-spacing:-0.02em;color:#5b21b6;font-variant-numeric:tabular-nums">₹{{ invested }}</span>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:360,&quot;height&quot;:190},&quot;net&quot;:{&quot;default&quot;:&quot;57,260&quot;},&quot;month&quot;:{&quot;default&quot;:&quot;June 2026&quot;},&quot;earned&quot;:{&quot;default&quot;:&quot;1,84,500&quot;},&quot;spent&quot;:{&quot;default&quot;:&quot;97,240&quot;},&quot;invested&quot;:{&quot;default&quot;:&quot;30,000&quot;},&quot;onPrev&quot;:{&quot;editor&quot;:null},&quot;onNext&quot;:{&quot;editor&quot;:null}}"></script>
</body>
</html>
