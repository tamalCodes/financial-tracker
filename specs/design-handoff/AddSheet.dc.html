<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..700&family=Geist:wght@400..600&display=swap" rel="stylesheet">
</helmet>
<div style="font-family:'Geist',system-ui,sans-serif;padding:10px 22px calc(24px + env(safe-area-inset-bottom))">
  <div style="display:flex;justify-content:center;padding:4px 0 16px"><span style="width:42px;height:5px;border-radius:999px;background:#e2e8f0"></span></div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
    <span style="font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:21px;letter-spacing:-0.01em;color:#0f172a">{{ title }}</span>
    <button onClick="{{ onClose }}" style="cursor:pointer;width:36px;height:36px;border-radius:12px;border:1px solid #e2e8f0;background:#f8fafc;color:#64748b;font-size:16px;display:flex;align-items:center;justify-content:center">✕</button>
  </div>

  <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:18px">
    <span style="font:500 13px 'Geist';color:#475569">Amount</span>
    <div style="display:flex;align-items:center;gap:8px;border:1px solid #e2e8f0;border-radius:16px;padding:0 16px;height:62px;background:#f8fafc">
      <span style="font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:26px;color:#94a3b8">₹</span>
      <input value="{{ amount }}" onInput="{{ onAmount }}" inputmode="numeric" placeholder="0" style="border:none;background:transparent;outline:none;font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:28px;letter-spacing:-0.01em;color:#0f172a;width:100%;font-variant-numeric:tabular-nums" />
    </div>
  </div>

  <sc-if value="{{ isExpense }}" hint-placeholder-val="{{ true }}">
    <div style="display:flex;flex-direction:column;gap:9px;margin-bottom:18px">
      <span style="font:500 13px 'Geist';color:#475569">Category</span>
      <div style="display:flex;flex-wrap:wrap;gap:8px">
        <sc-for list="{{ categories }}" as="cat" hint-placeholder-count="6">
          <sc-if value="{{ cat.selected }}" hint-placeholder-val="{{ false }}">
            <button onClick="{{ cat.onSelect }}" style="cursor:pointer;display:inline-flex;align-items:center;gap:7px;height:40px;padding:0 15px;border-radius:999px;font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:13px;color:{{ cat.text }};background:linear-gradient(135deg,rgba({{ cat.rgb }},0.30),rgba({{ cat.rgb }},0.15));border:1px solid rgba({{ cat.rgb }},0.50)"><span style="width:8px;height:8px;border-radius:999px;background:{{ cat.text }}"></span>{{ cat.label }}</button>
          </sc-if>
          <sc-if value="{{ cat.idle }}" hint-placeholder-val="{{ true }}">
            <button onClick="{{ cat.onSelect }}" style="cursor:pointer;display:inline-flex;align-items:center;gap:7px;height:40px;padding:0 15px;border-radius:999px;font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:13px;color:#64748b;background:#fff;border:1px solid #e2e8f0"><span style="width:8px;height:8px;border-radius:999px;background:#cbd5e1"></span>{{ cat.label }}</button>
          </sc-if>
        </sc-for>
      </div>
    </div>
  </sc-if>

  <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:22px">
    <span style="font:500 13px 'Geist';color:#475569">{{ noteLabel }}</span>
    <input value="{{ note }}" onInput="{{ onNote }}" placeholder="{{ notePlaceholder }}" style="width:100%;border:1px solid #e2e8f0;border-radius:14px;padding:0 15px;height:50px;font-family:'Geist',sans-serif;font-size:16px;color:#0f172a;background:#f8fafc;outline:none" style-focus="border-color:#818cf8" />
  </div>

  <button onClick="{{ onSave }}" style="cursor:pointer;width:100%;height:54px;border:none;border-radius:16px;background:#4f46e5;color:#fff;font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:15.5px;box-shadow:0 8px 20px -8px rgba(79,70,229,0.55)">{{ saveLabel }}</button>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:412,&quot;height&quot;:520},&quot;title&quot;:{&quot;default&quot;:&quot;Add expense&quot;},&quot;saveLabel&quot;:{&quot;default&quot;:&quot;Add expense&quot;},&quot;noteLabel&quot;:{&quot;default&quot;:&quot;Note&quot;},&quot;notePlaceholder&quot;:{&quot;default&quot;:&quot;e.g. Swiggy dinner&quot;},&quot;amount&quot;:{&quot;editor&quot;:null},&quot;note&quot;:{&quot;editor&quot;:null},&quot;isExpense&quot;:{&quot;default&quot;:true},&quot;categories&quot;:{&quot;editor&quot;:null}}"></script>
</body>
</html>
