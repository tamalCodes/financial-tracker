<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..700&family=Geist:wght@400..600&display=swap" rel="stylesheet">
</helmet>
<div style="font-family:'Geist',system-ui,sans-serif;background:#fff;border:1px solid #e2e8f0;border-radius:28px;box-shadow:0 1px 2px rgba(15,23,42,0.04),0 14px 30px -22px rgba(15,23,42,0.30);padding:22px 22px 12px;display:flex;flex-direction:column;gap:4px">
  <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding-bottom:14px">
    <div style="display:flex;flex-direction:column;gap:3px">
      <span style="font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:16px;color:#0f172a">Bills &amp; EMIs</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
      <span style="font:500 11px 'Geist';color:#64748b">Paid this month</span>
      <span style="font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:18px;color:#047857;font-variant-numeric:tabular-nums">₹{{ paidTotal }}</span>
    </div>
  </div>
  <sc-for list="{{ bills }}" as="bill" hint-placeholder-count="5">
    <div style="border-top:1px solid #f1f5f9">
      <sc-if value="{{ bill.unpaid }}" hint-placeholder-val="{{ true }}">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 1px">
          <div style="display:flex;align-items:center;gap:13px;min-width:0">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><path d="{{ bill.icon }}"/></svg>
            <div style="display:flex;flex-direction:column;gap:1px;min-width:0">
              <span style="font:600 14px 'Geist';color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ bill.name }}</span>
              <span style="font:500 11.5px 'Geist';color:#94a3b8">Due {{ bill.due }}</span>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;flex:none">
            <span style="font:600 14px 'Bricolage Grotesque';color:#0f172a;font-variant-numeric:tabular-nums">₹{{ bill.amount }}</span>
            <button onClick="{{ bill.onPay }}" style="cursor:pointer;font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:13px;color:#4338ca;background:#eef2ff;border:none;border-radius:999px;padding:0 18px;height:36px">Pay</button>
          </div>
        </div>
      </sc-if>
      <sc-if value="{{ bill.paid }}" hint-placeholder-val="{{ false }}">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 1px;opacity:0.62">
          <div style="display:flex;align-items:center;gap:13px;min-width:0">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="#047857" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><path d="M4 10.5l4 4 8-9"/></svg>
            <div style="display:flex;flex-direction:column;gap:1px;min-width:0">
              <span style="font:600 14px 'Geist';color:#475569;text-decoration:line-through;text-decoration-color:#cbd5e1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ bill.name }}</span>
              <span style="font:500 11.5px 'Geist';color:#94a3b8">{{ bill.due }}</span>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;flex:none">
            <span style="font:600 14px 'Bricolage Grotesque';color:#94a3b8;font-variant-numeric:tabular-nums">₹{{ bill.amount }}</span>
            <span style="font:600 12px 'Bricolage Grotesque';color:#047857">Paid</span>
          </div>
        </div>
      </sc-if>
    </div>
  </sc-for>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:360,&quot;height&quot;:420},&quot;bills&quot;:{&quot;editor&quot;:null},&quot;paidTotal&quot;:{&quot;default&quot;:&quot;620&quot;}}"></script>
</body>
</html>
